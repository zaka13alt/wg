<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruffle Flash Loader</title>

    <!-- Ruffle -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #player {
            width: 960px;
            height: 540px;
        }
    </style>
</head>
<body>

<div id="player"></div>

<script>
(async () => {
    // URL of the SWF file
    const swfUrl = "https://cdn.jsdelivr.net/gh/zaka13alt/wg@main/flashones/moto-x3m.swf";

    // Download the SWF
    const response = await fetch(swfUrl);

    if (!response.ok) {
        throw new Error("Failed to download SWF");
    }

    const swfBlob = await response.blob();

    // Create a temporary object URL
    const blobUrl = URL.createObjectURL(swfBlob);

    // Create the Ruffle player
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    document.getElementById("player").appendChild(player);

    // Load the downloaded SWF
    player.load({
        url: blobUrl
    });
})();
</script>

</body>
</html>
