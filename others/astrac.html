<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaglercraftX 1.8</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #f4f4f4;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        #error-msg {
            font-family: sans-serif;
            color: #d9534f;
            text-align: center;
            margin-top: 20vh;
        }
    </style>
</head>
<body>

    <iframe id="viewer"></iframe>
    <div id="error-msg"></div>

    <script>
        // REPLACE THIS WITH YOUR RAW GITHUB URL
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/RocketMCC-network/RocketMCC-network.github.io/refs/heads/main/astra.html';

        async function loadAndInject() {
            try {
                const response = await fetch(GITHUB_RAW_URL);
                
                if (!response.ok) {
                    throw new Error(`Failed to fetch file (Status: ${response.status} ${response.statusText})`);
                }

                const htmlContent = await response.text();
                
                // Inject the downloaded code into srcdoc
                const iframe = document.getElementById('viewer');
                iframe.srcdoc = htmlContent;

            } catch (error) {
                console.error('Error as follows', error);
                document.getElementById('error-msg').textContent = 'Error: ' + error.message;
            }
        }

        loadAndInject();
    </script>
</body>
</html>
